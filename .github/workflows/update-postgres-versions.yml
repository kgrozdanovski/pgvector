name: Update Postgres Versions

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update_postgres_versions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Update Postgres and pgvector versions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-postgres-versions.mjs

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/update-postgres-versions
          delete-branch: true
          commit-message: 'chore: update postgres and pgvector versions'
          title: 'chore: update postgres and pgvector versions'
          body: |
            Updates the generated Postgres Docker image matrix, README tags, and Dockerfile defaults from the official `postgres` Docker Hub tags and the latest `pgvector` release.

            Merging this PR only updates the version metadata. Run the **Create Release, Build and Push Docker Images to Docker Hub** workflow to rebuild and publish the images.
