name: Create Release, Build and Push Docker Images to Docker Hub

on:
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: kgrozdanovski/pgvector

jobs:
  prepare_versions:
    runs-on: ubuntu-latest
    outputs:
      latest_pg_version: ${{ steps.versions.outputs.latest_pg_version }}
      matrix: ${{ steps.versions.outputs.matrix }}

    steps:
      - uses: actions/checkout@v5

      - name: Load Postgres versions
        id: versions
        run: |
          echo "latest_pg_version=$(jq -r '.latest' postgres-versions.json)" >> "$GITHUB_OUTPUT"
          echo "matrix=$(jq -c '.matrix' postgres-versions.json)" >> "$GITHUB_OUTPUT"

  build_and_push:
    needs: prepare_versions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # Ensure jobs don't stop if one fails
      matrix: ${{ fromJSON(needs.prepare_versions.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build the Docker image
        run: |
          VARIANT="${{ matrix.variant }}"
          PG_VERSION="${{ matrix.pg_version }}"
          PG_MAJOR_VERSION="${PG_VERSION%%.*}"
          PG_VARIANT_SUFFIX=""

          # Select Dockerfile based on the variant
          if [ "$VARIANT" = "alpine" ]; then
            DOCKERFILE=Dockerfile.alpine
          else
            DOCKERFILE=Dockerfile
            if [ "$VARIANT" != "base" ]; then
              PG_VARIANT_SUFFIX="-$VARIANT"
            fi
          fi

          # Compose the image name
          if [ "$VARIANT" = "base" ]; then
            IMAGE_NAME=${{ env.IMAGE_NAME }}:$PG_VERSION
            MAJOR_IMAGE_NAME=${{ env.IMAGE_NAME }}:$PG_MAJOR_VERSION
          else
            IMAGE_NAME=${{ env.IMAGE_NAME }}:$PG_VERSION-$VARIANT
            MAJOR_IMAGE_NAME=${{ env.IMAGE_NAME }}:$PG_MAJOR_VERSION-$VARIANT
          fi

          BUILD_ARGS=(--build-arg "PG_VERSION=$PG_VERSION")
          if [ "$VARIANT" != "alpine" ]; then
            BUILD_ARGS+=(--build-arg "PG_VARIANT_SUFFIX=$PG_VARIANT_SUFFIX")
          fi

          # Build the Docker image with the appropriate tag
          docker build \
            "${BUILD_ARGS[@]}" \
            -f "$DOCKERFILE" \
            -t "$IMAGE_NAME" \
            -t "$MAJOR_IMAGE_NAME" .

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image to Docker Hub
        run: |
          VARIANT="${{ matrix.variant }}"
          PG_VERSION="${{ matrix.pg_version }}"
          PG_MAJOR_VERSION="${PG_VERSION%%.*}"

          if [ "$VARIANT" = "base" ]; then
            docker push "${{ env.IMAGE_NAME }}:$PG_VERSION"
            docker push "${{ env.IMAGE_NAME }}:$PG_MAJOR_VERSION"
          else
            docker push "${{ env.IMAGE_NAME }}:$PG_VERSION-$VARIANT"
            docker push "${{ env.IMAGE_NAME }}:$PG_MAJOR_VERSION-$VARIANT"
          fi

      # Tag and push "latest" for the newest base Postgres version
      - name: Tag the image as latest
        if: matrix.pg_version == needs.prepare_versions.outputs.latest_pg_version && matrix.variant == 'base'
        env:
          LATEST_PG_VERSION: ${{ needs.prepare_versions.outputs.latest_pg_version }}
        run: |
          docker tag "${{ env.IMAGE_NAME }}:$LATEST_PG_VERSION" "${{ env.IMAGE_NAME }}:latest"

      - name: Push latest tag to Docker Hub
        if: matrix.pg_version == needs.prepare_versions.outputs.latest_pg_version && matrix.variant == 'base'
        run: |
          docker push "${{ env.IMAGE_NAME }}:latest"

  changelog:
    needs: build_and_push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: master

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'latest'

      - name: Install semantic-release globally
        run: npm install -g semantic-release @semantic-release/changelog @semantic-release/github @semantic-release/exec @semantic-release/git

      - name: Configure git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Generate changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release --no-ci
