name: Create Release, Build and Push Docker Images to Docker Hub

on:
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: kgrozdanovski/pgvector

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # Ensure jobs don't stop if one fails
      matrix:
        pg_version: ["18.3", "17.9", "16.13", "15.17", "14.22", "13.22", "12.20"]
        variant: [base, alpine, bullseye, bookworm, trixie]
        exclude:
          - pg_version: "13.22"
            variant: trixie
          - pg_version: "12.20"
            variant: trixie

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build the Docker image
        run: |
          VARIANT="${{ matrix.variant }}"
          PG_VERSION="${{ matrix.pg_version }}"
          PG_VARIANT_SUFFIX=""

          # Select Dockerfile based on the variant
          if [ "$VARIANT" = "alpine" ]; then
            DOCKERFILE=Dockerfile.alpine
          else
            DOCKERFILE=Dockerfile
            if [ "$VARIANT" != "base" ]; then
              PG_VARIANT_SUFFIX="-$VARIANT"
            fi
          fi

          # Compose the image name
          if [ "$VARIANT" = "base" ]; then
            IMAGE_NAME=${{ env.IMAGE_NAME }}:$PG_VERSION
          else
            IMAGE_NAME=${{ env.IMAGE_NAME }}:$PG_VERSION-$VARIANT
          fi

          BUILD_ARGS=(--build-arg "PG_VERSION=$PG_VERSION")
          if [ "$VARIANT" != "alpine" ]; then
            BUILD_ARGS+=(--build-arg "PG_VARIANT_SUFFIX=$PG_VARIANT_SUFFIX")
          fi

          # Build the Docker image with the appropriate tag
          docker build \
            "${BUILD_ARGS[@]}" \
            -f "$DOCKERFILE" \
            -t "$IMAGE_NAME" .

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image to Docker Hub
        run: |
          if [ "${{ matrix.variant }}" = "base" ]; then
            docker push ${{ env.IMAGE_NAME }}:${{ matrix.pg_version }}
          else
            docker push ${{ env.IMAGE_NAME }}:${{ matrix.pg_version }}-${{ matrix.variant }}
          fi

      # Tag and push "latest" for the 18.3 version
      - name: Tag the image as latest
        if: matrix.pg_version == '18.3' && matrix.variant == 'base' # Only for 18.3 default flavor
        run: |
          docker tag ${{ env.IMAGE_NAME }}:18.3 ${{ env.IMAGE_NAME }}:latest

      - name: Push latest tag to Docker Hub
        if: matrix.pg_version == '18.3' && matrix.variant == 'base' # Only for 18.3 default flavor
        run: |
          docker push ${{ env.IMAGE_NAME }}:latest

  changelog:
    needs: build_and_push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: master

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'latest'

      - name: Install semantic-release globally
        run: npm install -g semantic-release @semantic-release/changelog @semantic-release/github @semantic-release/exec @semantic-release/git

      - name: Configure git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Generate changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release --no-ci
